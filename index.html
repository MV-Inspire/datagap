<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataGap</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M10 29c7-13 18-20 31-21-3 15-10 25-22 30l-5-5 10-10-13 7-1-1Z" />
              <path d="M12 35c7 3 15 3 24-1-5 6-12 9-21 8l-3-7Z" />
              <circle cx="32" cy="16" r="3" />
            </svg>
          </div>
          <div>
            <strong>DataGap</strong>
            <span>Consent-based data exchange</span>
          </div>
        </div>

        <nav aria-label="Main navigation"></nav>

        <div class="role-card">
          <div class="role-meta">
            <span>Account</span>
            <strong id="activeRole">User</strong>
          </div>
          <button id="switchRole" type="button" aria-label="Change account role">Change</button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Personal data + Al Quaa farm records</p>
            <h1 id="pageTitle">Data Control Center</h1>
          </div>
          <div class="topbar-actions">
            <div class="track-switch" aria-label="Choose data view">
              <span>View</span>
              <button class="track-option active" type="button" data-track="general">Personal</button>
              <button class="track-option" type="button" data-track="camel">Farm</button>
            </div>
            <div class="status-strip">
              <span id="consentStatus">Consent active</span>
              <strong id="walletBalance">AED 0</strong>
            </div>
          </div>
        </header>

        <section id="overview" class="view active"></section>
        <section id="permissions" class="view"></section>
        <section id="submit" class="view"></section>
        <section id="wallet" class="view"></section>
        <section id="buyers" class="view"></section>
        <section id="company" class="view"></section>
        <section id="admin" class="view"></section>
        <section id="ai" class="view"></section>
        <section id="profile" class="view"></section>
        <section id="about" class="view"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
